name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps, inputs, and environment.
      placeholder: |
        1. Open vault...
        2. Edit entry...
        3. Save...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: Release tag or commit hash.
      placeholder: v1.2.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Android
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Paste non-sensitive logs and screenshots.

  - type: checkboxes
    id: security
    attributes:
      label: Security and Privacy
      options:
        - label: I confirm this report does not include passwords, private keys, or plaintext secrets.
          required: true

name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build_windows:
    name: Build Windows Zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore Windows dependencies
        run: dotnet restore src/Vault.App/Vault.App.csproj -r win-x64 -p:EnableAndroid=false -p:TargetFramework=net8.0-windows10.0.19041.0 -p:TargetFrameworks=net8.0-windows10.0.19041.0

      - name: Publish Windows (Release)
        run: dotnet publish src/Vault.App/Vault.App.csproj -f net8.0-windows10.0.19041.0 -r win-x64 -c Release --no-restore -p:EnableAndroid=false -p:TargetFrameworks=net8.0-windows10.0.19041.0

      - name: Create Windows zip
        shell: pwsh
        run: |
          $publishDir = "src/Vault.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (-not (Test-Path $publishDir)) {
            throw "Publish folder not found: $publishDir"
          }

          $distDir = "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          $stagingDir = Join-Path $distDir "LocalSecureVault-windows-${{ github.ref_name }}"
          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Copy-Item -Path "$publishDir/*" -Destination $stagingDir -Recurse -Force

          $zipPath = Join-Path $distDir "LocalSecureVault-windows-${{ github.ref_name }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.zip
          if-no-files-found: error

  build_android:
    name: Build Android APK
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Android workloads
        run: dotnet workload install android wasm-tools-net8

      - name: Restore Android dependencies
        run: dotnet restore src/Vault.App/Vault.App.csproj -p:EnableAndroid=true -p:TargetFrameworks=net8.0-android

      - name: Publish Android (Release)
        run: dotnet publish src/Vault.App/Vault.App.csproj -f net8.0-android -c Release --no-restore -p:EnableAndroid=true -p:TargetFrameworks=net8.0-android

      - name: Collect signed APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Recurse -Path "src/Vault.App/bin/Release/net8.0-android" -Filter "*-Signed.apk" | Sort-Object FullName | Select-Object -First 1
          if (-not $apk) {
            throw "Signed APK not found in src/Vault.App/bin/Release/net8.0-android"
          }

          $distDir = "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          $apkOut = Join-Path $distDir "LocalSecureVault-companion-android-${{ github.ref_name }}.apk"
          Copy-Item $apk.FullName $apkOut -Force

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: dist/*.apk
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build_windows
      - build_android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-package
          path: release-assets/android

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/*.zip
            release-assets/android/*.apk
